<script>
var tg=window.Telegram&&window.Telegram.WebApp;
if(tg){tg.ready();tg.expand();}
var p=new URLSearchParams(window.location.search);
var su=decodeURIComponent(p.get("url")||"");
var du=decodeURIComponent(p.get("dl")||su);
var nm=decodeURIComponent(p.get("name")||"Video");
var sz=decodeURIComponent(p.get("size")||"");
document.getElementById("t").textContent=nm;
document.getElementById("n").textContent=nm;
document.getElementById("s").textContent=sz;
document.getElementById("b1").href=du;
document.getElementById("b2").href=du;
var v=document.getElementById("v");
function err(m){var e=document.getElementById("err");e.textContent="❌ "+m;e.style.display="block";}

function tryPlay(url){
  if(Hls.isSupported() && su){
    var hls=new Hls({xhrSetup:function(xhr){xhr.withCredentials=false;}});
    hls.loadSource(su);
    hls.attachMedia(v);
    hls.on(Hls.Events.MANIFEST_PARSED,function(){v.play().catch(function(){});});
    hls.on(Hls.Events.ERROR,function(e,d){
      if(d.fatal){
        v.src=url;
        v.load();
        v.play().catch(function(){err("Playback failed. Please download.");});
      }
    });
  } else {
    v.src=url;
    v.load();
    v.play().catch(function(){err("Playback failed. Please download.");});
  }
}

if(!su&&!du){err("No URL.");}
else{ tryPlay(du||su); }

function goFull(){
  if(tg&&tg.requestFullscreen){tg.requestFullscreen();return;}
  if(v.webkitEnterFullscreen){v.webkitEnterFullscreen();return;}
  if(v.requestFullscreen){v.requestFullscreen();}
}
</script>
