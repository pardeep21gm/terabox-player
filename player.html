<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;font-family:sans-serif;color:#fff;}
video{width:100%;display:block;background:#000;}
.bar{padding:10px 14px;background:#111;display:flex;align-items:center;gap:10px;}
.back{background:rgba(255,255,255,0.1);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;}
.title{font-size:13px;color:#ccc;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.meta{padding:12px 14px;background:#111;border-top:1px solid #222;}
.name{font-size:13px;font-weight:600;margin-bottom:4px;word-break:break-all;}
.size{font-size:11px;color:#666;}
.btns{padding:12px 14px;background:#0a0a0a;}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:12px;border:none;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px;text-decoration:none;}
.bp{background:linear-gradient(135deg,#6c42ff,#3ab6ff);color:#fff;}
.bd{background:#1a1a2e;color:#3ab6ff;border:1px solid rgba(58,182,255,0.3);}
.bl{background:#111;color:#555;border:1px solid #222;}
.err{padding:12px 14px;color:#ff6b6b;font-size:13px;display:none;}
.foot{text-align:center;padding:12px;font-size:11px;color:#333;}
.foot a{color:#6c42ff;text-decoration:none;}
</style>
</head>
<body>
<div class="bar">
  <button class="back" onclick="history.back()">&#8592;</button>
  <div class="title" id="t">Loading...</div>
</div>
<video id="v" controls playsinline webkit-playsinline autoplay></video>
<div class="meta">
  <div class="name" id="n">—</div>
  <div class="size" id="s">—</div>
</div>
<div class="btns">
  <button class="btn bp" onclick="goFull()">&#x26F6; Full Screen</button>
  <a class="btn bd" id="b1" href="#" target="_blank">&#11015; Download (High Speed)</a>
  <a class="btn bl" id="b2" href="#" target="_blank">&#128229; Download Link</a>
</div>
<div class="err" id="err"></div>
<div class="foot">Powered by <a href="https://t.me/TBoxLinkHub">@TBoxLinkHub</a></div>
<script>
var tg=window.Telegram&&window.Telegram.WebApp;
if(tg){tg.ready();tg.expand();}
var p=new URLSearchParams(window.location.search);
var su=decodeURIComponent(p.get("url")||"");
var du=decodeURIComponent(p.get("dl")||su);
var nm=decodeURIComponent(p.get("name")||"Video");
var sz=decodeURIComponent(p.get("size")||"");
document.getElementById("t").textContent=nm;
document.getElementById("n").textContent=nm;
document.getElementById("s").textContent=sz;
document.getElementById("b1").href=du;
document.getElementById("b2").href=du;
var v=document.getElementById("v");
function err(m){var e=document.getElementById("err");e.textContent="❌ "+m;e.style.display="block";}
if(!su&&!du){err("No URL.");}
else{
  var playUrl=du||su;
  v.src=playUrl;
  v.play().catch(function(){
    if(su&&Hls.isSupported()){
      var hls=new Hls();
      hls.loadSource(su);
      hls.attachMedia(v);
      hls.on(Hls.Events.MANIFEST_PARSED,function(){v.play().catch(function(){});});
      hls.on(Hls.Events.ERROR,function(e,d){if(d.fatal)err("Stream failed. Please download.");});
    }
  });
}
function goFull(){
  if(tg&&tg.requestFullscreen){tg.requestFullscreen();return;}
  if(v.webkitEnterFullscreen){v.webkitEnterFullscreen();return;}
  if(v.requestFullscreen){v.requestFullscreen();}
}
</script>
</body>
</html>
